<header
  class="fixed top-0 w-full z-50 transition-all duration-300"
  [ngClass]="scrolled()
    ? 'shadow-lg dark:shadow-black/30 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl border-b border-slate-200/30 dark:border-slate-800/30'
    : 'bg-transparent border-b border-transparent'">

  <div class="flex justify-between items-center px-6 md:px-8 py-4 max-w-7xl mx-auto">

    <!-- Logo -->
    <div class="shimmer-text font-headline text-sm font-bold tracking-[0.2em] uppercase cursor-pointer
                text-slate-900 dark:text-slate-50"
         (click)="scrollTo('home')">
      {{ i18n.get('navbar_logo') }}
    </div>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex gap-8 font-headline tracking-wider font-medium uppercase text-xs">
      @for (link of navLinks; track link.href) {
        <a (click)="scrollTo(link.href)"
           class="kinetic-border cursor-pointer pb-1 transition-colors"
           [ngClass]="{
             'text-indigo-600 dark:text-primary': activeSection() === link.href,
             'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100': activeSection() !== link.href
           }">
          {{ i18n.get(link.labelKey) }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-2">
      <!-- Language toggle -->
      <button (click)="i18n.toggle()"
              class="p-2 rounded-full transition-colors
                     hover:bg-slate-200/60 dark:hover:bg-slate-800/60
                     font-headline text-[11px] font-bold tracking-widest uppercase
                     text-slate-700 dark:text-slate-300 w-9 h-9 flex items-center justify-center"
              [attr.aria-label]="i18n.lang() === 'en' ? i18n.get('navbar_aria_lang_en') : i18n.get('navbar_aria_lang_fr')">
        {{ i18n.lang() === 'en' ? 'FR' : 'EN' }}
      </button>

      <!-- Theme toggle -->
      <button (click)="themeService.toggle()"
              class="p-2 rounded-full transition-colors
                     hover:bg-slate-200/60 dark:hover:bg-slate-800/60"
              [attr.aria-label]="i18n.get('navbar_aria_theme')">
        @if (themeService.isDark()) {
          <span class="material-symbols-outlined text-slate-300 text-[18px]">light_mode</span>
        } @else {
          <span class="material-symbols-outlined text-slate-700 text-[18px]">dark_mode</span>
        }
      </button>

      <!-- Hire Me pill -->
      <button (click)="scrollTo('contact')"
              class="hidden md:block border-beam px-5 py-2
                     bg-indigo-600 dark:bg-primary
                     text-white dark:text-on-primary
                     text-[10px] font-bold uppercase tracking-[0.15em] rounded-full
                     transition-all hover:opacity-80 active:scale-95 duration-200 font-headline">
        {{ i18n.get('nav_hire') }}
      </button>

      <!-- Hamburger -->
      <button (click)="toggleMobile()" class="md:hidden p-1 text-slate-900 dark:text-slate-50">
        <span class="material-symbols-outlined">{{ mobileOpen() ? 'close' : 'menu' }}</span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileOpen()) {
    <div class="md:hidden flex flex-col bg-white/95 dark:bg-slate-950/95 backdrop-blur-xl px-6 pb-6 pt-2 gap-1 border-t border-slate-200/20 dark:border-slate-800/20">
      @for (link of navLinks; track link.href) {
        <a (click)="scrollTo(link.href)"
           class="cursor-pointer py-3 font-headline font-semibold text-slate-700 dark:text-slate-300 uppercase tracking-wider text-sm hover:text-indigo-600 dark:hover:text-primary transition-colors border-b border-slate-100 dark:border-slate-800/50 last:border-0">
          {{ i18n.get(link.labelKey) }}
        </a>
      }
      <button (click)="scrollTo('contact')"
              class="mt-3 px-5 py-3 bg-indigo-600 dark:bg-primary text-white dark:text-on-primary text-xs font-bold uppercase tracking-widest rounded text-center font-headline w-full">
        {{ i18n.get('nav_hire') }}
      </button>
    </div>
  }
</header>
