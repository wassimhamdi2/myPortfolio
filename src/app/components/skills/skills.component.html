<section class="py-16 sm:py-28 px-4 sm:px-6 md:px-8 bg-slate-100 dark:bg-surface-container-low transition-colors duration-300 overflow-hidden">
  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="skills-header flex flex-col md:flex-row items-start md:items-end justify-between mb-10 sm:mb-16 gap-4">
      <div>
        <p class="font-serif-luxury italic text-indigo-400 dark:text-primary/60 text-base sm:text-lg mb-1">{{ i18n.get('about_skills_eyebrow') }}</p>
        <h2 class="font-headline text-3xl sm:text-4xl md:text-5xl font-bold text-slate-900 dark:text-on-surface tracking-tighter mb-2 sm:mb-3">
          {{ i18n.get('about_skills_heading') }}
        </h2>
        <p class="font-body text-slate-500 dark:text-on-surface-variant text-sm sm:text-base">{{ i18n.get('about_skills_sub') }}</p>
      </div>
      <div class="luxury-divider flex-1 mx-8 hidden md:block"></div>
    </div>

    <!-- Grid -->
    <div class="skills-grid grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-5">
      @for (skill of skills; track skill.label) {
        <div class="skill-card spotlight-card p-4 sm:p-7 bg-white dark:bg-surface-container rounded-xl
                    border border-slate-200 dark:border-outline-variant/10
                    hover:border-indigo-600/30 dark:hover:border-primary/40
                    transition-all duration-300 group cursor-default"
             (mousemove)="onSpotlight($event)">
          <span class="font-label text-indigo-600 dark:text-primary text-[9px] font-bold block mb-2 sm:mb-4 uppercase tracking-[0.25em]">
            {{ skill.label }}
          </span>
          <span class="text-slate-800 dark:text-on-surface font-headline font-semibold text-xs sm:text-sm leading-relaxed">
            {{ skill.content }}
          </span>
        </div>
      }
    </div>

  </div>
</section>
